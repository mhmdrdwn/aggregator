<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Norske Nyheter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    header h1 { font-size: 1.3rem; font-weight: 700; flex: 1; }
    header span { font-size: 0.8rem; opacity: 0.5; }

    .toolbar {
      padding: 1rem 2rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid #e2e4e9;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d0d3da;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .search-box:focus { outline: none; border-color: #4a6cf7; }

    .source-filter {
      padding: 0.5rem 0.75rem;
      border: 1px solid #d0d3da;
      border-radius: 6px;
      font-size: 0.9rem;
      background: #fff;
      cursor: pointer;
    }
    .source-filter:focus { outline: none; border-color: #4a6cf7; }

    .stats { font-size: 0.8rem; color: #6b7280; margin-left: auto; white-space: nowrap; }

    /* ── Entities bubble section ─────────────────────────────────────────── */

    .entities-section {
      background: #fff;
      border-bottom: 1px solid #e2e4e9;
      padding: 1rem 2rem 0.75rem;
    }

    .entities-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .entities-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #374151;
      white-space: nowrap;
    }

    .label-filters {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .label-btn {
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      background: #f3f4f6;
      color: #374151;
    }
    .label-btn:hover { background: #e5e7eb; }
    .label-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    .label-btn[data-label="PER"].active   { background: #1d4ed8; border-color: #1d4ed8; }
    .label-btn[data-label="ORG"].active   { background: #065f46; border-color: #065f46; }
    .label-btn[data-label="GPE"].active   { background: #92400e; border-color: #92400e; }
    .label-btn[data-label="EVENT"].active { background: #5b21b6; border-color: #5b21b6; }

    .toggle-entities {
      margin-left: auto;
      font-size: 0.75rem;
      color: #9ca3af;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
    }
    .toggle-entities:hover { color: #374151; }

    #bubble-chart {
      width: 100%;
      overflow: hidden;
      transition: height 0.25s ease;
    }
    #bubble-chart.collapsed { height: 0 !important; }

    #bubble-chart svg { display: block; }

    .bubble-tooltip {
      position: fixed;
      background: #1a1a2e;
      color: #fff;
      font-size: 0.78rem;
      padding: 0.3rem 0.6rem;
      border-radius: 5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 100;
      white-space: nowrap;
    }

    /* ── Article grid ────────────────────────────────────────────────────── */

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
      padding: 1.5rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 1.25rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: box-shadow 0.15s, transform 0.15s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
      transform: translateY(-2px);
    }

    .card-source {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #4a6cf7;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.4;
      color: #1a1a2e;
    }

    .card-snippet {
      font-size: 0.85rem;
      color: #4b5563;
      line-height: 1.55;
      flex: 1;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #9ca3af;
      padding-top: 0.4rem;
      border-top: 1px solid #f3f4f6;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.2rem;
    }
    .tag {
      font-size: 0.68rem;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-weight: 500;
    }
    .tag-PER   { background: #dbeafe; color: #1d4ed8; }
    .tag-ORG   { background: #d1fae5; color: #065f46; }
    .tag-GPE,
    .tag-LOC   { background: #fef3c7; color: #92400e; }
    .tag-EVENT { background: #ede9fe; color: #5b21b6; }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      padding: 1.5rem 2rem 2.5rem;
    }
    .page-btn {
      padding: 0.45rem 0.85rem;
      border: 1px solid #d0d3da;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.1s;
    }
    .page-btn:hover:not(:disabled) { background: #f0f2ff; border-color: #4a6cf7; }
    .page-btn:disabled { opacity: 0.4; cursor: default; }
    .page-btn.active { background: #4a6cf7; color: #fff; border-color: #4a6cf7; }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: #9ca3af;
      font-size: 1rem;
    }

    .skeleton {
      background: linear-gradient(90deg, #f0f2f5 25%, #e8eaed 50%, #f0f2f5 75%);
      background-size: 400% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
      height: 1em;
    }
    @keyframes shimmer { to { background-position: -400% 0; } }
  </style>
</head>
<body>

<header>
  <h1>🇳🇴 Norske Nyheter</h1>
  <span id="last-updated"></span>
</header>

<div class="toolbar">
  <input class="search-box" id="search" type="search" placeholder="Søk i tittel eller innhold…" />
  <select class="source-filter" id="source-select">
    <option value="">Alle kilder</option>
  </select>
  <span class="stats" id="stats"></span>
</div>

<!-- Entities bubble chart -->
<section class="entities-section">
  <div class="entities-header">
    <span class="entities-title">Trender</span>
    <div class="label-filters" id="label-filters">
      <button class="label-btn active" data-label="">Alle</button>
      <button class="label-btn" data-label="PER">Personer</button>
      <button class="label-btn" data-label="ORG">Organisasjoner</button>
      <button class="label-btn" data-label="GPE">Steder</button>
      <button class="label-btn" data-label="EVENT">Hendelser</button>
    </div>
    <button class="toggle-entities" id="toggle-entities">Skjul ▲</button>
  </div>
  <div id="bubble-chart"></div>
</section>

<div class="bubble-tooltip" id="bubble-tooltip"></div>

<main class="grid" id="grid"></main>
<div class="pagination" id="pagination"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
  const grid       = document.getElementById('grid');
  const pagination = document.getElementById('pagination');
  const searchEl   = document.getElementById('search');
  const sourceEl   = document.getElementById('source-select');
  const statsEl    = document.getElementById('stats');
  const updatedEl  = document.getElementById('last-updated');
  const tooltip    = document.getElementById('bubble-tooltip');

  let currentPage  = 1;
  let activeLabel  = '';
  let searchTimer;
  let bubblesCollapsed = false;

  // ── label colors (fill, stroke, text) ────────────────────────────────────
  const COLORS = {
    PER:   { fill: '#bfdbfe', stroke: '#3b82f6', text: '#1e3a8a' },
    ORG:   { fill: '#a7f3d0', stroke: '#10b981', text: '#064e3b' },
    GPE:   { fill: '#fde68a', stroke: '#f59e0b', text: '#78350f' },
    LOC:   { fill: '#fde68a', stroke: '#f59e0b', text: '#78350f' },
    EVENT: { fill: '#ddd6fe', stroke: '#8b5cf6', text: '#3b0764' },
  };
  function col(label) { return COLORS[label] || COLORS.PER; }

  // ── helpers ───────────────────────────────────────────────────────────────

  function fmt(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('nb-NO', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
  }

  function tagHtml(entities) {
    const seen = new Set();
    return (entities || [])
      .filter(e => { if (seen.has(e.text)) return false; seen.add(e.text); return true; })
      .slice(0, 5)
      .map(e => `<span class="tag tag-${e.label}">${e.text}</span>`)
      .join('');
  }

  function fitText(text, r) {
    if (r < 14) return '';
    const maxChars = Math.floor((r * 2 * 0.82) / 7);
    return text.length <= maxChars ? text : text.slice(0, maxChars - 1) + '…';
  }

  function renderSkeletons() {
    grid.innerHTML = Array(6).fill(`
      <div class="card" style="pointer-events:none">
        <div class="skeleton" style="width:30%;height:.7em"></div>
        <div class="skeleton" style="width:90%;height:1.1em;margin-top:.3rem"></div>
        <div class="skeleton" style="width:75%;height:1.1em"></div>
        <div class="skeleton" style="width:100%;height:3.5em;margin-top:.4rem"></div>
      </div>`).join('');
    pagination.innerHTML = '';
  }

  // ── bubble chart ──────────────────────────────────────────────────────────

  async function loadEntities() {
    const params = new URLSearchParams({ limit: 80, source: sourceEl.value });
    if (activeLabel) params.set('label', activeLabel);
    const data = await fetch(`/api/entities?${params}`).then(r => r.json());
    drawBubbles(data);
  }

  function drawBubbles(entities) {
    const container = document.getElementById('bubble-chart');
    container.innerHTML = '';

    if (!entities.length) {
      container.style.height = '60px';
      container.innerHTML = '<p style="text-align:center;padding:1rem 2rem;color:#9ca3af;font-size:.85rem">Ingen trender funnet.</p>';
      return;
    }

    const W = container.clientWidth || 900;
    const H = 260;
    container.style.height = H + 'px';

    const root = d3.hierarchy({ children: entities })
      .sum(d => d.count)
      .sort((a, b) => b.value - a.value);

    d3.pack().size([W, H]).padding(4)(root);

    const svg = d3.create('svg')
      .attr('width', W)
      .attr('height', H);

    const node = svg.selectAll('g')
      .data(root.leaves())
      .join('g')
      .attr('transform', d => `translate(${d.x},${d.y})`)
      .style('cursor', 'pointer')
      .on('click', (event, d) => {
        searchEl.value = d.data.text;
        currentPage = 1;
        loadArticles();
        tooltip.style.opacity = 0;
      })
      .on('mousemove', (event, d) => {
        tooltip.textContent = `${d.data.text}  ·  ${d.data.count} artikler`;
        tooltip.style.opacity = 1;
        tooltip.style.left = (event.clientX + 12) + 'px';
        tooltip.style.top  = (event.clientY - 28) + 'px';
      })
      .on('mouseleave', () => { tooltip.style.opacity = 0; });

    node.append('circle')
      .attr('r', d => d.r)
      .attr('fill', d => col(d.data.label).fill)
      .attr('stroke', d => col(d.data.label).stroke)
      .attr('stroke-width', 1.5);

    node.append('text')
      .attr('text-anchor', 'middle')
      .attr('dy', '0.35em')
      .attr('fill', d => col(d.data.label).text)
      .style('font-size', d => `${Math.min(13, Math.max(9, d.r * 0.42))}px`)
      .style('font-weight', '600')
      .style('pointer-events', 'none')
      .style('user-select', 'none')
      .text(d => fitText(d.data.text, d.r));

    container.appendChild(svg.node());
  }

  // Redraw on resize
  let resizeTimer;
  new ResizeObserver(() => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(loadEntities, 150);
  }).observe(document.getElementById('bubble-chart').parentElement);

  // ── toggle collapse ───────────────────────────────────────────────────────

  document.getElementById('toggle-entities').addEventListener('click', function () {
    const chart = document.getElementById('bubble-chart');
    bubblesCollapsed = !bubblesCollapsed;
    if (bubblesCollapsed) {
      chart.style.height = '0';
      chart.style.overflow = 'hidden';
      this.textContent = 'Vis ▼';
    } else {
      chart.style.overflow = '';
      loadEntities();
      this.textContent = 'Skjul ▲';
    }
  });

  // ── label filter buttons ──────────────────────────────────────────────────

  document.getElementById('label-filters').addEventListener('click', e => {
    const btn = e.target.closest('.label-btn');
    if (!btn) return;
    document.querySelectorAll('.label-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeLabel = btn.dataset.label;
    loadEntities();
  });

  // ── sources dropdown ──────────────────────────────────────────────────────

  async function loadSources() {
    const data = await fetch('/api/sources').then(r => r.json());
    data.forEach(({ source, count }) => {
      const opt = document.createElement('option');
      opt.value = source;
      opt.textContent = `${source} (${count})`;
      sourceEl.appendChild(opt);
    });
  }

  // ── articles ──────────────────────────────────────────────────────────────

  async function loadArticles() {
    renderSkeletons();

    const params = new URLSearchParams({
      page: currentPage,
      limit: 20,
      source: sourceEl.value,
      q: searchEl.value.trim(),
    });

    const data = await fetch(`/api/articles?${params}`).then(r => r.json());

    statsEl.textContent = `${data.total.toLocaleString('nb-NO')} artikler`;
    updatedEl.textContent = `Side ${data.page} av ${data.pages}`;

    if (data.articles.length === 0) {
      grid.innerHTML = '<p class="empty">Ingen artikler funnet.</p>';
      pagination.innerHTML = '';
      return;
    }

    grid.innerHTML = data.articles.map(a => `
      <a class="card" href="${a.url}" target="_blank" rel="noopener">
        <div class="card-source">${a.source || 'Ukjent kilde'}</div>
        <div class="card-title">${a.title || 'Uten tittel'}</div>
        ${a.snippet ? `<div class="card-snippet">${a.snippet}…</div>` : ''}
        ${tagHtml(a.entities) ? `<div class="tags">${tagHtml(a.entities)}</div>` : ''}
        <div class="card-meta">
          <span>${a.author || ''}</span>
          <span>${fmt(a.published_at)}</span>
        </div>
      </a>`).join('');

    renderPagination(data.page, data.pages);
  }

  function renderPagination(page, pages) {
    if (pages <= 1) { pagination.innerHTML = ''; return; }

    const range = [];
    for (let i = Math.max(1, page - 2); i <= Math.min(pages, page + 2); i++) range.push(i);

    pagination.innerHTML = `
      <button class="page-btn" ${page === 1 ? 'disabled' : ''} onclick="go(${page - 1})">←</button>
      ${range[0] > 1 ? `<button class="page-btn" onclick="go(1)">1</button>${range[0] > 2 ? '<span>…</span>' : ''}` : ''}
      ${range.map(p => `<button class="page-btn ${p === page ? 'active' : ''}" onclick="go(${p})">${p}</button>`).join('')}
      ${range.at(-1) < pages ? `${range.at(-1) < pages - 1 ? '<span>…</span>' : ''}<button class="page-btn" onclick="go(${pages})">${pages}</button>` : ''}
      <button class="page-btn" ${page === pages ? 'disabled' : ''} onclick="go(${page + 1})">→</button>`;
  }

  // ── events ────────────────────────────────────────────────────────────────

  window.go = function(p) { currentPage = p; loadArticles(); window.scrollTo(0, 0); };

  searchEl.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 1; loadArticles(); }, 400);
  });

  sourceEl.addEventListener('change', () => {
    currentPage = 1;
    loadArticles();
    if (!bubblesCollapsed) loadEntities();
  });

  // ── init ──────────────────────────────────────────────────────────────────
  loadSources();
  loadArticles();
  loadEntities();
</script>
</body>
</html>
