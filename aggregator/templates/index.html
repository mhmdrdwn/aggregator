<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Norske Nyheter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:   #c8102e;
      --ink:   #111111;
      --muted: #6b7280;
      --line:  #e5e7eb;
      --bg:    #f9f9f7;
      --white: #ffffff;
      --sans:  'Inter', -apple-system, sans-serif;
      --serif: 'Playfair Display', Georgia, serif;
      --radius: 8px;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */

    header {
      background: var(--white);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
    }
    .header-flag { font-size: 1.25rem; line-height: 1; }
    header h1 {
      font-family: var(--serif);
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--ink);
    }
    #article-count {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Search bar ──────────────────────────────────────────────────────── */

    .search-bar {
      background: var(--white);
      border-bottom: 1px solid var(--line);
    }
    .search-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0.75rem 1.5rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 0.55rem 1rem;
      border: 1px solid var(--line);
      border-radius: 20px;
      font-family: var(--sans);
      font-size: 0.88rem;
      color: var(--ink);
      background: var(--bg);
      transition: border-color 0.15s, background 0.15s;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--ink);
      background: var(--white);
    }
    .date-label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
    .date-input {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-family: var(--sans);
      font-size: 0.82rem;
      color: var(--ink);
      background: var(--white);
    }
    .date-input:focus { outline: none; border-color: var(--ink); }
    .active-filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.7rem;
      background: var(--ink);
      color: var(--white);
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
    }
    .active-filter-pill:hover { background: #333; }

    /* ── Explore panel ───────────────────────────────────────────────────── */

    .explore-section {
      background: var(--white);
      border-bottom: 1px solid var(--line);
    }
    .explore-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem 1rem;
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--line);
      margin-bottom: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      font-weight: 500;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      background: none;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.12s, border-color 0.12s;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.open { color: var(--ink); border-bottom-color: var(--red); font-weight: 600; }

    .tab-panel { display: none; padding: 0.85rem 0 0.5rem; }
    .tab-panel.open { display: block; }

    .label-filters {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }
    .label-btn {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      border: 1px solid var(--line);
      cursor: pointer;
      background: var(--white);
      color: var(--muted);
      transition: all 0.12s;
    }
    .label-btn:hover { border-color: var(--ink); color: var(--ink); }
    .label-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

    #bubble-chart, #topics-chart, #sources-chart, #places-chart,
    #authors-chart { width: 100%; overflow: hidden; }

    .tooltip {
      position: fixed;
      background: var(--ink);
      color: var(--white);
      font-size: 0.75rem;
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 100;
      white-space: nowrap;
    }


    /* ── Article grid ────────────────────────────────────────────────────── */

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      padding: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, border-color 0.15s;
      overflow: hidden;
    }
    .card:hover {
      border-color: #c0c0c0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .card-img {
      width: calc(100% + 3rem);
      margin: -1.25rem -1.5rem 0.5rem;
      height: 160px;
      object-fit: cover;
      border-radius: var(--radius) var(--radius) 0 0;
      display: block;
    }

    .card-source {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .sentiment-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sentiment-dot.positive { background: #22c55e; }
    .sentiment-dot.negative { background: #ef4444; }
    .sentiment-dot.neutral  { background: #d1d5db; }

    .topic-chip {
      margin-left: auto;
      font-size: 0.65rem;
      font-weight: 500;
      padding: 0.1rem 0.5rem;
      border-radius: 20px;
      background: #f3f4f6;
      color: #6b7280;
      text-transform: none;
      letter-spacing: 0;
    }

    .card-title {
      font-family: var(--serif);
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--ink);
    }
    .card:hover .card-title { color: var(--red); }

    .card-snippet {
      font-size: 0.85rem;
      color: #4b5563;
      line-height: 1.65;
      flex: 1;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      color: var(--muted);
      padding-top: 0.6rem;
      border-top: 1px solid #f3f4f6;
      gap: 0.5rem;
    }
    .card-author { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-date { white-space: nowrap; }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
      padding: 1.5rem 1.5rem 3rem;
    }
    .page-btn {
      min-width: 36px;
      height: 36px;
      padding: 0 0.6rem;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--white);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: var(--sans);
      color: var(--ink);
      transition: all 0.12s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--ink); }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .page-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
    .pagination span { color: var(--muted); font-size: 0.85rem; }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      font-size: 1rem;
    }

    .skeleton {
      background: linear-gradient(90deg, #f3f4f6 25%, #e9eaec 50%, #f3f4f6 75%);
      background-size: 400% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 4px;
      height: 1em;
    }
    @keyframes shimmer { to { background-position: -400% 0; } }

    .date-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    /* ── Mobile ──────────────────────────────────────────────────────────── */

    @media (max-width: 640px) {
      .header-inner { padding: 0.75rem 1rem; }

      .search-inner {
        flex-direction: column;
        align-items: stretch;
        padding: 0.6rem 1rem;
        gap: 0.5rem;
      }
      .search-input { min-width: 0; }
      .date-row { flex-wrap: wrap; }
      .date-input { flex: 1; min-width: 110px; }

      .explore-inner { padding: 0 1rem 1rem; }

      .grid {
        padding: 1rem;
        gap: 0.75rem;
      }

      .card { padding: 1rem 1.1rem 0.85rem; }
      .card-img {
        width: calc(100% + 2.2rem);
        margin: -1rem -1.1rem 0.5rem;
      }

      .pagination { padding: 1rem 1rem 2.5rem; }
      .page-btn { min-width: 32px; height: 32px; font-size: 0.8rem; }
    }

  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-brand">
      <span class="header-flag">🇳🇴</span>
      <h1>Norske Nyheter</h1>
    </div>
    <span id="article-count"></span>
  </div>
</header>

<div class="search-bar">
  <div class="search-inner">
    <input class="search-input" id="search" type="search" placeholder="Søk i nyheter…" />
    <div class="date-row">
      <span class="date-label">Fra</span>
      <input class="date-input" id="date-from" type="date" />
      <span class="date-label">Til</span>
      <input class="date-input" id="date-to" type="date" />
    </div>
    <span id="active-filter-wrap"></span>
  </div>
</div>

<section class="explore-section">
  <div class="explore-inner">
    <div class="tabs" id="main-tabs">
      <button class="tab-btn open" data-panel="trends">Trender</button>
      <button class="tab-btn" data-panel="topics">Emner</button>
      <button class="tab-btn" data-panel="sources">Kilder</button>
      <button class="tab-btn" data-panel="places">Steder</button>
      <button class="tab-btn" data-panel="authors">Journalister</button>
    </div>

    <div class="tab-panel open" id="panel-trends">
      <div class="label-filters" id="label-filters">
        <button class="label-btn active" data-label="">Alle</button>
        <button class="label-btn" data-label="PER">Personer</button>
        <button class="label-btn" data-label="ORG">Organisasjoner</button>
        <button class="label-btn" data-label="GPE">Steder</button>
        <button class="label-btn" data-label="EVENT">Hendelser</button>
      </div>
      <div id="bubble-chart"></div>
    </div>
    <div class="tab-panel" id="panel-topics"><div id="topics-chart"></div></div>
    <div class="tab-panel" id="panel-sources"><div id="sources-chart"></div></div>
    <div class="tab-panel" id="panel-places"><div id="places-chart"></div></div>
    <div class="tab-panel" id="panel-authors"><div id="authors-chart"></div></div>
  </div>
</section>

<div class="tooltip" id="tooltip"></div>


<main class="grid" id="grid"></main>
<div class="pagination" id="pagination"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
  const grid       = document.getElementById('grid');
  const pagination = document.getElementById('pagination');
  const searchEl   = document.getElementById('search');
  const dateFromEl = document.getElementById('date-from');
  const dateToEl   = document.getElementById('date-to');
  const countEl    = document.getElementById('article-count');
  const filterWrap = document.getElementById('active-filter-wrap');
  const tooltip    = document.getElementById('tooltip');

  let currentPage  = 1;
  let activeLabel  = '';
  let activeSource = new Set();
  let activeTopic  = new Set();
  let activeAuthor = new Set();
  let activeEntity = new Set();
  let searchTimer;

  // ── colors ────────────────────────────────────────────────────────────────

  const ENTITY_COLORS = {
    PER:   { fill: '#dbeafe', stroke: '#3b82f6', text: '#1e3a8a' },
    ORG:   { fill: '#d1fae5', stroke: '#10b981', text: '#064e3b' },
    GPE:   { fill: '#fef3c7', stroke: '#f59e0b', text: '#78350f' },
    LOC:   { fill: '#fef3c7', stroke: '#f59e0b', text: '#78350f' },
    EVENT: { fill: '#ede9fe', stroke: '#8b5cf6', text: '#3b0764' },
  };
  function col(label) { return ENTITY_COLORS[label] || ENTITY_COLORS.PER; }

  const TOPIC_COLORS = {
    sport:        { fill: '#dbeafe', stroke: '#3b82f6', text: '#1e3a8a' },
    kriminalitet: { fill: '#fee2e2', stroke: '#ef4444', text: '#7f1d1d' },
    politikk:     { fill: '#fce7f3', stroke: '#ec4899', text: '#831843' },
    økonomi:      { fill: '#d1fae5', stroke: '#10b981', text: '#064e3b' },
    helse:        { fill: '#ede9fe', stroke: '#8b5cf6', text: '#3b0764' },
    teknologi:    { fill: '#cffafe', stroke: '#06b6d4', text: '#164e63' },
    klima:        { fill: '#dcfce7', stroke: '#22c55e', text: '#14532d' },
    kultur:       { fill: '#fef9c3', stroke: '#eab308', text: '#713f12' },
    utenriks:     { fill: '#ffedd5', stroke: '#f97316', text: '#7c2d12' },
    forsvar:      { fill: '#e2e8f0', stroke: '#64748b', text: '#0f172a' },
    utdanning:    { fill: '#fae8ff', stroke: '#a855f7', text: '#4a044e' },
    samfunn:      { fill: '#f0fdf4', stroke: '#4ade80', text: '#14532d' },
  };

  // Unified inactive/active palette for sources, places, authors
  const ITEM_COLOR  = { fill: '#f1f5f9', stroke: '#cbd5e1', text: '#334155' };
  const ITEM_ACTIVE = { fill: '#1e293b', stroke: '#1e293b', text: '#ffffff' };

  const TOPIC_LABELS = {
    politikk: 'Politikk', økonomi: 'Økonomi', sport: 'Sport',
    kriminalitet: 'Kriminalitet', helse: 'Helse', teknologi: 'Teknologi',
    klima: 'Klima', kultur: 'Kultur', utenriks: 'Utenriks',
    forsvar: 'Forsvar', utdanning: 'Utdanning', samfunn: 'Samfunn',
  };

  // ── helpers ───────────────────────────────────────────────────────────────

  function fmt(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const diffH = (now - d) / 3600000;
    if (diffH < 1) return `${Math.round(diffH * 60)} min siden`;
    if (diffH < 24) return `${Math.round(diffH)} t siden`;
    return d.toLocaleDateString('nb-NO', { day: 'numeric', month: 'short' });
  }

  function renderSkeletons() {
    grid.innerHTML = Array(8).fill(`
      <div class="card" style="pointer-events:none">
        <div class="skeleton" style="width:28%;height:.7em"></div>
        <div class="skeleton" style="width:85%;height:1.1em;margin-top:.5rem"></div>
        <div class="skeleton" style="width:70%;height:1.1em;margin-top:.3rem"></div>
        <div class="skeleton" style="width:100%;height:3em;margin-top:.5rem"></div>
      </div>`).join('');
    pagination.innerHTML = '';
  }

  function updateActiveFilterPill() {
    const filters = [];
    activeSource.forEach(v => filters.push({ key: 'source', value: v, label: v }));
    activeTopic.forEach(v  => filters.push({ key: 'topic',  value: v, label: TOPIC_LABELS[v] || v }));
    activeAuthor.forEach(v => filters.push({ key: 'author', value: v, label: v }));
    activeEntity.forEach(v => filters.push({ key: 'entity', value: v, label: `"${v}"` }));
    filterWrap.innerHTML = filters.map(f =>
      `<span class="active-filter-pill" onclick="clearFilter(${JSON.stringify(f.key)},${JSON.stringify(f.value)})">${f.label} ×</span>`
    ).join(' ');
  }

  window.clearFilter = function(key, value) {
    if (key === 'source') activeSource.delete(value);
    if (key === 'topic')  activeTopic.delete(value);
    if (key === 'author') activeAuthor.delete(value);
    if (key === 'entity') activeEntity.delete(value);
    currentPage = 1;
    updateActiveFilterPill();
    loadArticles();
    reloadActiveChart();
  };

  // ── treemap ───────────────────────────────────────────────────────────────

  function drawTreemap(data, containerId, H, colorFn, clickFn) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';

    if (!data.length) {
      container.style.height = '60px';
      container.innerHTML = '<p style="text-align:center;padding:1.5rem;color:#9ca3af;font-size:.85rem">Ingen data.</p>';
      return;
    }

    const W = container.clientWidth || 900;
    container.style.height = H + 'px';

    const root = d3.hierarchy({ children: data })
      .sum(d => d.count)
      .sort((a, b) => b.value - a.value);

    d3.treemap().size([W, H]).padding(3).round(true)(root);

    const svg = d3.create('svg').attr('width', W).attr('height', H);

    const node = svg.selectAll('g')
      .data(root.leaves())
      .join('g')
      .attr('transform', d => `translate(${d.x0},${d.y0})`)
      .style('cursor', 'pointer')
      .on('click', (event, d) => { clickFn(d.data); tooltip.style.opacity = 0; })
      .on('mousemove', (event, d) => {
        tooltip.textContent = `${d.data.text}  ·  ${d.data.count.toLocaleString('nb-NO')} artikler`;
        tooltip.style.opacity = 1;
        tooltip.style.left = (event.clientX + 14) + 'px';
        tooltip.style.top  = (event.clientY - 32) + 'px';
      })
      .on('mouseleave', () => { tooltip.style.opacity = 0; });

    node.append('rect')
      .attr('width',  d => Math.max(0, d.x1 - d.x0))
      .attr('height', d => Math.max(0, d.y1 - d.y0))
      .attr('rx', 5)
      .attr('fill',         d => colorFn(d.data).fill)
      .attr('stroke',       d => colorFn(d.data).stroke)
      .attr('stroke-width', 1);

    node.append('text')
      .attr('x', d => (d.x1 - d.x0) / 2)
      .attr('y', d => (d.y1 - d.y0) / 2)
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'middle')
      .attr('fill', d => colorFn(d.data).text)
      .style('pointer-events', 'none')
      .style('user-select', 'none')
      .each(function(d) {
        const w = d.x1 - d.x0, h = d.y1 - d.y0;
        if (w < 28 || h < 16) return;
        const fs = Math.min(13, Math.max(9, Math.sqrt(w * h) * 0.1));
        const maxChars = Math.floor(w / (fs * 0.58));
        const lbl = d.data.text.length <= maxChars ? d.data.text : d.data.text.slice(0, maxChars - 1) + '…';
        d3.select(this).style('font-size', `${fs}px`).style('font-weight', '600').text(lbl);
      });

    container.appendChild(svg.node());
  }

  // ── chart loaders ─────────────────────────────────────────────────────────

  function isMobile() { return window.innerWidth < 640; }

  async function loadEntities() {
    const params = new URLSearchParams({ limit: isMobile() ? 15 : 36, source: [...activeSource].join(',') });
    if (activeLabel) params.set('label', activeLabel);
    const data = await fetch(`/api/entities?${params}`).then(r => r.json());
    drawTreemap(data, 'bubble-chart', 280,
      d => {
        const c = col(d.label);
        return activeEntity.has(d.text)
          ? { fill: c.stroke, stroke: c.stroke, text: '#fff' }
          : c;
      },
      d => {
        activeEntity.has(d.text) ? activeEntity.delete(d.text) : activeEntity.add(d.text);
        searchEl.value = '';
        currentPage = 1;
        updateActiveFilterPill();
        loadArticles();
        loadEntities();
      }
    );
  }

  async function loadTopicsChart() {
    const data = await fetch('/api/topics').then(r => r.json());
    const items = data.map(({ topic, count }) => ({ text: TOPIC_LABELS[topic] || topic, key: topic, count }));
    drawTreemap(items, 'topics-chart', 220,
      d => {
        const c = TOPIC_COLORS[d.key] || ITEM_COLOR;
        return activeTopic.has(d.key) ? { fill: c.stroke, stroke: c.stroke, text: '#fff' } : c;
      },
      d => {
        activeTopic.has(d.key) ? activeTopic.delete(d.key) : activeTopic.add(d.key);
        currentPage = 1; updateActiveFilterPill(); loadArticles(); loadTopicsChart();
      }
    );
  }

  async function loadSourcesChart() {
    const data = await fetch('/api/sources').then(r => r.json());
    const items = data.slice(0, isMobile() ? 10 : 18).map(({ source, count }) => ({ text: source, count }));
    drawTreemap(items, 'sources-chart', 240,
      d => activeSource.has(d.text) ? ITEM_ACTIVE : ITEM_COLOR,
      d => {
        activeSource.has(d.text) ? activeSource.delete(d.text) : activeSource.add(d.text);
        currentPage = 1; updateActiveFilterPill(); loadArticles(); loadSourcesChart();
      }
    );
  }

  const PLACES = [
    { city: 'Bergen',         source: 'Bergens Tidende' },
    { city: 'Trondheim',      source: 'Adresseavisen' },
    { city: 'Stavanger',      source: 'Stavanger Aftenblad' },
    { city: 'Ålesund',        source: 'Sunnmørsposten' },
    { city: 'Kristiansund',   source: 'Romsdals Budstikke' },
    { city: 'Kristiansand',   source: 'Fædrelandsvennen' },
    { city: 'Harstad',        source: 'Harstad Tidende' },
    { city: 'Alta',           source: 'Altaposten' },
    { city: 'Innherred',      source: 'Innherred' },
    { city: 'Tromsø',         source: 'Nordlys' },
    { city: 'Nord-Tromsø',    source: 'iTromsø' },
    { city: 'Agder',          source: 'Agderposten' },
    { city: 'Sunnhordland',   source: 'Sunnhordland' },
    { city: 'Finnmark',       source: 'Framtid i Nord' },
    { city: 'Trøndelag',      source: 'Trønder-Avisa' },
    { city: 'Trønderbladet',  source: 'Trønderbladet' },
    { city: 'Sør-Trøndelag',  source: 'Avisa Sør-Trøndelag' },
    { city: 'Grenland',       source: 'Varden' },
    { city: 'Bodø',           source: 'Avisa Nordland' },
    { city: 'Moss',           source: 'Moss Avis' },
    { city: 'Tønsberg',       source: 'Tønsbergs Blad' },
    { city: 'Oppland',        source: 'Oppland Arbeiderblad' },
    { city: 'Skien',          source: 'Telemarksavisa' },
    { city: 'Fredrikstad',    source: 'Fredriksstad Blad' },
    { city: 'Narvik',         source: 'Fremover' },
    { city: 'Romerike',       source: 'Romerikes Blad' },
    { city: 'Bærum',          source: 'Budstikka' },
    { city: 'Lofoten',        source: 'Lofotposten' },
    { city: 'Haugesund',      source: 'Haugesunds Avis' },
    { city: 'Gudbrandsdalen', source: 'Gudbrandsdølen Dagningen' },
    { city: 'Halden',         source: 'Halden Arbeiderblad' },
    { city: 'Namsos',         source: 'Namdalsavisa' },
    { city: 'Vesterålen',     source: 'Bladet Vesterålen' },
    { city: 'Drammen',        source: 'Drammens Tidende' },
    { city: 'Mo i Rana',      source: 'Rana Blad' },
    { city: 'Hamar',          source: 'Hamar Arbeiderblad' },
    { city: 'Elverum',        source: 'Østlendingen' },
    { city: 'Kongsvinger',    source: 'Glåmdalen' },
    { city: 'Steinkjer',      source: 'Steinkjer-Avisa' },
  ];

  async function loadPlacesChart() {
    const data = await fetch('/api/sources').then(r => r.json());
    const counts = Object.fromEntries(data.map(({ source, count }) => [source, count]));
    const items = PLACES
      .map(({ city, source }) => ({ text: city, source, count: counts[source] || 0 }))
      .filter(d => d.count > 0)
      .sort((a, b) => b.count - a.count)
      .slice(0, isMobile() ? 12 : undefined);
    drawTreemap(items, 'places-chart', 240,
      d => activeSource.has(d.source) ? ITEM_ACTIVE : ITEM_COLOR,
      d => {
        activeSource.has(d.source) ? activeSource.delete(d.source) : activeSource.add(d.source);
        currentPage = 1; updateActiveFilterPill(); loadArticles(); loadPlacesChart();
      }
    );
  }

  async function loadAuthorsChart() {
    const params = new URLSearchParams({ source: [...activeSource].join(','), topic: [...activeTopic].join(','), days: 7, limit: isMobile() ? 20 : 50 });
    const data = await fetch(`/api/authors?${params}`).then(r => r.json());
    const items = data.map(({ author, count, sources }) => ({ text: author, count, sources }));

    drawTreemap(items, 'authors-chart', 260,
      d => activeAuthor.has(d.text) ? ITEM_ACTIVE : ITEM_COLOR,
      d => {
        activeAuthor.has(d.text) ? activeAuthor.delete(d.text) : activeAuthor.add(d.text);
        currentPage = 1; updateActiveFilterPill(); loadArticles(); loadAuthorsChart();
        tooltip.style.opacity = 0;
      }
    );

    const container = document.getElementById('authors-chart');
    container.querySelectorAll('g').forEach((g, i) => {
      if (!items[i]) return;
      const { text, count, sources } = items[i];
      const srcLabel = sources.slice(0, 2).join(', ') + (sources.length > 2 ? ` +${sources.length - 2}` : '');
      g.addEventListener('mousemove', ev => {
        tooltip.textContent = `${text}  ·  ${count} art.  ·  ${srcLabel}`;
        tooltip.style.opacity = 1;
        tooltip.style.left = (ev.clientX + 14) + 'px';
        tooltip.style.top  = (ev.clientY - 32) + 'px';
      });
    });
  }

  // ── chart panel routing ───────────────────────────────────────────────────

  function reloadActiveChart() {
    const active = document.querySelector('.tab-btn.open');
    if (!active) return;
    const p = active.dataset.panel;
    if (p === 'trends') loadEntities();
    else if (p === 'topics') loadTopicsChart();
    else if (p === 'sources') loadSourcesChart();
    else if (p === 'places') loadPlacesChart();
    else if (p === 'authors') loadAuthorsChart();
  }

  let resizeTimer;
  function onResize() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(reloadActiveChart, 200);
  }
  window.addEventListener('resize', onResize);
  new ResizeObserver(onResize).observe(document.querySelector('.explore-inner'));

  document.getElementById('main-tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab-btn');
    if (!tab) return;
    const panelId = 'panel-' + tab.dataset.panel;
    if (document.getElementById(panelId).classList.contains('open')) return;
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('open'));
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('open'));
    document.getElementById(panelId).classList.add('open');
    tab.classList.add('open');
    if (tab.dataset.panel === 'trends') loadEntities();
    else if (tab.dataset.panel === 'topics') loadTopicsChart();
    else if (tab.dataset.panel === 'sources') loadSourcesChart();
    else if (tab.dataset.panel === 'places') loadPlacesChart();
    else if (tab.dataset.panel === 'authors') loadAuthorsChart();
  });

  document.getElementById('label-filters').addEventListener('click', e => {
    const btn = e.target.closest('.label-btn');
    if (!btn) return;
    document.querySelectorAll('.label-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeLabel = btn.dataset.label;
    loadEntities();
  });


  // ── articles ──────────────────────────────────────────────────────────────

  async function loadArticles() {
    renderSkeletons();
    const params = new URLSearchParams({
      page: currentPage, limit: 21,
      source: [...activeSource].join(','),
      topic:  [...activeTopic].join(','),
      author: [...activeAuthor].join(','),
      q: [...activeEntity].join(',') || searchEl.value.trim(),
      date_from: dateFromEl.value, date_to: dateToEl.value,
    });
    let data;
    try {
      const resp = await fetch(`/api/articles?${params}`);
      if (!resp.ok) throw new Error(`Server feil ${resp.status}`);
      data = await resp.json();
    } catch (err) {
      grid.innerHTML = `<p class="empty">Kunne ikke laste artikler — ${err.message}</p>`;
      pagination.innerHTML = '';
      return;
    }

    countEl.textContent = `${data.total.toLocaleString('nb-NO')} artikler`;

    if (data.articles.length === 0) {
      grid.innerHTML = '<p class="empty">Ingen artikler funnet.</p>';
      pagination.innerHTML = '';
      return;
    }

    grid.innerHTML = data.articles.map(a => {
      const topicLabel = a.topic ? (TOPIC_LABELS[a.topic] || a.topic) : '';
      const sentClass  = a.sentiment || 'neutral';
      return `
      <a class="card" href="${a.url}" target="_blank" rel="noopener">
        ${a.image_url ? `<img class="card-img" src="${a.image_url}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
        <div class="card-source">
          <span class="sentiment-dot ${sentClass}"></span>
          ${a.source || 'Ukjent kilde'}
          ${topicLabel ? `<span class="topic-chip">${topicLabel}</span>` : ''}
        </div>
        <div class="card-title">${a.title || 'Uten tittel'}</div>
        ${a.snippet ? `<div class="card-snippet">${a.snippet}…</div>` : ''}
        <div class="card-footer">
          <span class="card-author">${a.author || ''}</span>
          <span class="card-date">${fmt(a.published_at)}</span>
        </div>
      </a>`;
    }).join('');

    renderPagination(data.page, data.pages);
  }

  function renderPagination(page, pages) {
    if (pages <= 1) { pagination.innerHTML = ''; return; }
    const range = [];
    for (let i = Math.max(1, page - 2); i <= Math.min(pages, page + 2); i++) range.push(i);
    pagination.innerHTML = `
      <button class="page-btn" ${page === 1 ? 'disabled' : ''} onclick="go(${page - 1})">←</button>
      ${range[0] > 1 ? `<button class="page-btn" onclick="go(1)">1</button>${range[0] > 2 ? '<span>…</span>' : ''}` : ''}
      ${range.map(p => `<button class="page-btn ${p === page ? 'active' : ''}" onclick="go(${p})">${p}</button>`).join('')}
      ${range.at(-1) < pages ? `${range.at(-1) < pages - 1 ? '<span>…</span>' : ''}<button class="page-btn" onclick="go(${pages})">${pages}</button>` : ''}
      <button class="page-btn" ${page === pages ? 'disabled' : ''} onclick="go(${page + 1})">→</button>`;
  }

  // ── events ────────────────────────────────────────────────────────────────

  window.go = function(p) { currentPage = p; loadArticles(); window.scrollTo(0, 0); };

  searchEl.addEventListener('input', () => {
    clearTimeout(searchTimer);
    activeAuthor.clear();
    activeEntity.clear();
    searchTimer = setTimeout(() => { currentPage = 1; updateActiveFilterPill(); loadArticles(); }, 400);
  });
  dateFromEl.addEventListener('change', () => { currentPage = 1; loadArticles(); });
  dateToEl.addEventListener('change',   () => { currentPage = 1; loadArticles(); });


  // ── init ──────────────────────────────────────────────────────────────────
  loadArticles();
  loadEntities();
</script>
