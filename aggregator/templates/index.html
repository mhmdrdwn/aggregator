<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Norske Nyheter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #c8102e;
      --ink:    #111111;
      --muted:  #737373;
      --light:  #e5e5e5;
      --bg:     #f5f4f0;
      --white:  #ffffff;
      --sans:   'Inter', -apple-system, sans-serif;
      --serif:  'Playfair Display', Georgia, serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */

    header {
      background: var(--white);
      border-bottom: 3px solid var(--ink);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-brand {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .header-flag { font-size: 1.4rem; line-height: 1; }
    header h1 {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .header-rule {
      width: 1px;
      background: var(--light);
      margin: 0.6rem 1.5rem;
    }
    #last-updated {
      font-size: 0.75rem;
      color: var(--muted);
      align-self: center;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */

    .toolbar {
      background: var(--white);
      border-bottom: 1px solid var(--light);
    }
    .toolbar-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0.75rem 2rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box,
    .source-filter,
    .date-input {
      padding: 0.45rem 0.75rem;
      border: 1px solid var(--light);
      border-radius: 4px;
      font-family: var(--sans);
      font-size: 0.85rem;
      color: var(--ink);
      background: var(--white);
      transition: border-color 0.15s;
    }
    .search-box { flex: 1; min-width: 200px; }
    .search-box:focus,
    .source-filter:focus,
    .date-input:focus { outline: none; border-color: var(--ink); }

    .date-label {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .stats {
      font-size: 0.78rem;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── Trends section ──────────────────────────────────────────────────── */

    .entities-section {
      background: var(--white);
      border-bottom: 1px solid var(--light);
    }
    .entities-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem 0.75rem;
    }

    .main-tabs {
      display: flex;
      border-bottom: 2px solid var(--light);
      margin-bottom: 0;
    }
    .main-tab {
      padding: 0.65rem 1.1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }
    .main-tab:hover { color: var(--ink); }
    .main-tab.open { color: var(--ink); border-bottom-color: var(--red); }

    .main-panel { display: none; padding: 0.7rem 0 0.4rem; }
    .main-panel.open { display: block; }

    .label-filters { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 0.6rem; }

    .label-btn {
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
      font-size: 0.72rem;
      font-weight: 500;
      border: 1px solid var(--light);
      cursor: pointer;
      transition: all 0.12s;
      background: var(--white);
      color: var(--muted);
    }
    .label-btn:hover { border-color: var(--ink); color: var(--ink); }
    .label-btn.active                      { background: var(--ink);  color: var(--white); border-color: var(--ink); }
    .label-btn[data-label="PER"].active    { background: #1d4ed8; border-color: #1d4ed8; }
    .label-btn[data-label="ORG"].active    { background: #065f46; border-color: #065f46; }
    .label-btn[data-label="GPE"].active    { background: #92400e; border-color: #92400e; }
    .label-btn[data-label="EVENT"].active  { background: #5b21b6; border-color: #5b21b6; }

    #bubble-chart, #topics-chart, #sources-chart, #places-chart {
      width: 100%; overflow: hidden; transition: height 0.25s ease;
    }
    #bubble-chart svg, #topics-chart svg, #sources-chart svg, #places-chart svg { display: block; }

    .bubble-tooltip {
      position: fixed;
      background: var(--ink);
      color: var(--white);
      font-size: 0.75rem;
      padding: 0.3rem 0.65rem;
      border-radius: 3px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 100;
      white-space: nowrap;
    }

    /* ── Analytics row ───────────────────────────────────────────────────── */

    .analytics-section {
      background: var(--white);
      border-bottom: 1px solid var(--light);
    }
    .analytics-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0.7rem 2rem 0.55rem;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 2rem;
      align-items: start;
    }
    .analytics-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }
    .sent-legend {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 400;
    }
    .legend-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 0.2rem;
    }
    .legend-dot.positive { background: #4ade80; }
    .legend-dot.neutral  { background: #d1d5db; }
    .legend-dot.negative { background: #f87171; }
    #sentiment-chart, #sov-chart { width: 100%; }

    /* ── Coverage heatmap ────────────────────────────────────────────────── */
    .coverage-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    .coverage-table th { font-weight: 600; text-align: center; padding: 4px 6px; color: var(--muted); font-size: 0.7rem; }
    .coverage-table td { padding: 2px 3px; }
    .coverage-table .src-label { text-align: right; padding-right: 8px; white-space: nowrap; color: var(--ink); font-weight: 500; cursor: pointer; }
    .coverage-table .src-label:hover { color: var(--red); }
    .cov-cell { width: 28px; height: 22px; border-radius: 3px; text-align: center; line-height: 22px; font-size: 0.68rem; font-weight: 600; }

    /* ── Article grid ────────────────────────────────────────────────────── */

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--light);
      padding: 1.4rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: transparent;
      transition: background 0.15s;
    }
    .card:hover { border-color: #aaa; }
    .card:hover::before { background: var(--red); }

    .card-source {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 0.62rem;
      font-weight: 500;
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-topic    { background: #f0f0f0; color: #555; }
    .sentiment-positive { background: #d1fae5; color: #065f46; }
    .sentiment-negative { background: #fee2e2; color: #991b1b; }
    .sentiment-neutral  { background: #f3f4f6; color: #737373; }

    .card-title {
      font-family: var(--serif);
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--ink);
    }

    .card-snippet {
      font-size: 0.83rem;
      color: #525252;
      line-height: 1.6;
      flex: 1;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
      padding-top: 0.5rem;
      border-top: 1px solid #f0f0f0;
    }

    .tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .tag {
      font-size: 0.65rem;
      padding: 0.12rem 0.4rem;
      border-radius: 2px;
      font-weight: 500;
    }
    .tag-PER   { background: #dbeafe; color: #1d4ed8; }
    .tag-ORG   { background: #d1fae5; color: #065f46; }
    .tag-GPE,
    .tag-LOC   { background: #fef3c7; color: #92400e; }
    .tag-EVENT { background: #ede9fe; color: #5b21b6; }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      padding: 1.5rem 2rem 2.5rem;
    }
    .page-btn {
      padding: 0.45rem 0.85rem;
      border: 1px solid #d0d3da;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.1s;
    }
    .page-btn:hover:not(:disabled) { background: var(--bg); border-color: var(--ink); }
    .page-btn:disabled { opacity: 0.4; cursor: default; }
    .page-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: #9ca3af;
      font-size: 1rem;
    }

    .skeleton {
      background: linear-gradient(90deg, #f0f2f5 25%, #e8eaed 50%, #f0f2f5 75%);
      background-size: 400% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
      height: 1em;
    }
    @keyframes shimmer { to { background-position: -400% 0; } }

  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <span class="header-flag">🇳🇴</span>
    <h1>Norske Nyheter</h1>
    <div class="header-rule"></div>
    <span id="last-updated"></span>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <input class="search-box" id="search" type="search" placeholder="Søk i tittel eller innhold…" />
    <span class="date-label">Fra</span>
    <input class="date-input" id="date-from" type="date" />
    <span class="date-label">Til</span>
    <input class="date-input" id="date-to" type="date" />
    <span class="stats" id="stats"></span>
  </div>
</div>

<section class="entities-section">
  <div class="entities-inner">
    <div class="main-tabs" id="main-tabs">
      <button class="main-tab open" data-panel="trends">Trender</button>
      <button class="main-tab" data-panel="topics">Emner</button>
      <button class="main-tab" data-panel="sources">Kilder</button>
      <button class="main-tab" data-panel="places">Steder</button>
      <button class="main-tab" data-panel="coverage">Dekning</button>
    </div>
    <div class="main-panel open" id="panel-trends">
      <div class="label-filters" id="label-filters">
        <button class="label-btn active" data-label="">Alle</button>
        <button class="label-btn" data-label="PER">Personer</button>
        <button class="label-btn" data-label="ORG">Organisasjoner</button>
        <button class="label-btn" data-label="GPE">Steder</button>
        <button class="label-btn" data-label="EVENT">Hendelser</button>
      </div>
      <div id="bubble-chart"></div>
    </div>
    <div class="main-panel" id="panel-topics">
      <div id="topics-chart"></div>
    </div>
    <div class="main-panel" id="panel-sources">
      <div id="sources-chart"></div>
    </div>
    <div class="main-panel" id="panel-places">
      <div id="places-chart"></div>
    </div>
    <div class="main-panel" id="panel-coverage">
      <div id="coverage-chart"></div>
    </div>
  </div>
</section>

<div class="bubble-tooltip" id="bubble-tooltip"></div>

<div class="analytics-section">
  <div class="analytics-inner">
    <div class="analytics-panel">
      <div class="analytics-label">
        Sentiment · siste uke
        <span class="sent-legend">
          <span class="legend-dot positive"></span>Pos
          <span class="legend-dot neutral"></span>Nøy
          <span class="legend-dot negative"></span>Neg
        </span>
      </div>
      <div id="sentiment-chart"></div>
    </div>
    <div class="analytics-panel">
      <div class="analytics-label">Entitetsutvikling · siste uke</div>
      <div id="sov-chart"></div>
    </div>
  </div>
</div>

<main class="grid" id="grid"></main>
<div class="pagination" id="pagination"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
  const grid       = document.getElementById('grid');
  const pagination = document.getElementById('pagination');
  const searchEl   = document.getElementById('search');
  const dateFromEl = document.getElementById('date-from');
  const dateToEl   = document.getElementById('date-to');
  const statsEl    = document.getElementById('stats');
  const updatedEl  = document.getElementById('last-updated');
  const tooltip    = document.getElementById('bubble-tooltip');

  let currentPage  = 1;
  let activeLabel  = '';
  let activeSource = '';
  let activeTopic  = '';
  let searchTimer;

  // ── label colors (fill, stroke, text) ────────────────────────────────────
  const COLORS = {
    PER:   { fill: '#bfdbfe', stroke: '#3b82f6', text: '#1e3a8a' },
    ORG:   { fill: '#a7f3d0', stroke: '#10b981', text: '#064e3b' },
    GPE:   { fill: '#fde68a', stroke: '#f59e0b', text: '#78350f' },
    LOC:   { fill: '#fde68a', stroke: '#f59e0b', text: '#78350f' },
    EVENT: { fill: '#ddd6fe', stroke: '#8b5cf6', text: '#3b0764' },
  };
  function col(label) { return COLORS[label] || COLORS.PER; }

  // ── helpers ───────────────────────────────────────────────────────────────

  function fmt(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('nb-NO', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
  }

  function tagHtml(entities) {
    const seen = new Set();
    return (entities || [])
      .filter(e => { if (seen.has(e.text)) return false; seen.add(e.text); return true; })
      .slice(0, 5)
      .map(e => `<span class="tag tag-${e.label}">${e.text}</span>`)
      .join('');
  }

  function renderSkeletons() {
    grid.innerHTML = Array(6).fill(`
      <div class="card" style="pointer-events:none">
        <div class="skeleton" style="width:30%;height:.7em"></div>
        <div class="skeleton" style="width:90%;height:1.1em;margin-top:.3rem"></div>
        <div class="skeleton" style="width:75%;height:1.1em"></div>
        <div class="skeleton" style="width:100%;height:3.5em;margin-top:.4rem"></div>
      </div>`).join('');
    pagination.innerHTML = '';
  }

  // ── treemap (generic) ────────────────────────────────────────────────────

  const TOPIC_LABELS = {
    politikk: 'Politikk', økonomi: 'Økonomi', sport: 'Sport',
    kriminalitet: 'Kriminalitet', helse: 'Helse', teknologi: 'Teknologi',
    klima: 'Klima', kultur: 'Kultur', utenriks: 'Utenriks',
    forsvar: 'Forsvar', utdanning: 'Utdanning', samfunn: 'Samfunn',
  };

  const TOPIC_COLORS = {
    sport:        { fill: '#dbeafe', stroke: '#3b82f6', text: '#1e3a8a' },
    kriminalitet: { fill: '#fee2e2', stroke: '#ef4444', text: '#7f1d1d' },
    politikk:     { fill: '#fce7f3', stroke: '#ec4899', text: '#831843' },
    økonomi:      { fill: '#d1fae5', stroke: '#10b981', text: '#064e3b' },
    helse:        { fill: '#ede9fe', stroke: '#8b5cf6', text: '#3b0764' },
    teknologi:    { fill: '#cffafe', stroke: '#06b6d4', text: '#164e63' },
    klima:        { fill: '#dcfce7', stroke: '#22c55e', text: '#14532d' },
    kultur:       { fill: '#fef9c3', stroke: '#eab308', text: '#713f12' },
    utenriks:     { fill: '#ffedd5', stroke: '#f97316', text: '#7c2d12' },
    forsvar:      { fill: '#e2e8f0', stroke: '#64748b', text: '#0f172a' },
    utdanning:    { fill: '#fae8ff', stroke: '#a855f7', text: '#4a044e' },
    samfunn:      { fill: '#f0fdf4', stroke: '#4ade80', text: '#14532d' },
  };
  const SOURCE_COLOR  = { fill: '#f0f2f5', stroke: '#94a3b8', text: '#1e293b' };
  const SOURCE_ACTIVE = { fill: '#1e293b', stroke: '#0f172a', text: '#f8fafc' };

  const PLACE_COLOR  = { fill: '#e0f2fe', stroke: '#38bdf8', text: '#0c4a6e' };
  const PLACE_ACTIVE = { fill: '#0c4a6e', stroke: '#0369a1', text: '#f0f9ff' };

  const PLACES = [
    { city: 'Bergen',         source: 'Bergens Tidende' },
    { city: 'Trondheim',      source: 'Adresseavisen' },
    { city: 'Stavanger',      source: 'Stavanger Aftenblad' },
    { city: 'Ålesund',        source: 'Sunnmørsposten' },
    { city: 'Kristiansund',   source: 'Romsdals Budstikke' },
    { city: 'Kristiansand',   source: 'Fædrelandsvennen' },
    { city: 'Harstad',        source: 'Harstad Tidende' },
    { city: 'Alta',           source: 'Altaposten' },
    { city: 'Innherred',      source: 'Innherred' },
    { city: 'Tromsø',         source: 'Nordlys' },
    { city: 'Nord-Tromsø',    source: 'iTromsø' },
    { city: 'Agder',          source: 'Agderposten' },
    { city: 'Sunnhordland',   source: 'Sunnhordland' },
    { city: 'Finnmark',       source: 'Framtid i Nord' },
    { city: 'Trøndelag',      source: 'Trønder-Avisa' },
    { city: 'Trønderbladet',  source: 'Trønderbladet' },
    { city: 'Sør-Trøndelag',  source: 'Avisa Sør-Trøndelag' },
    { city: 'Grenland',       source: 'Varden' },
    { city: 'Bodø',           source: 'Avisa Nordland' },
    { city: 'Moss',           source: 'Moss Avis' },
    { city: 'Tønsberg',       source: 'Tønsbergs Blad' },
    { city: 'Oppland',        source: 'Oppland Arbeiderblad' },
    { city: 'Skien',          source: 'Telemarksavisa' },
    { city: 'Fredrikstad',    source: 'Fredriksstad Blad' },
    { city: 'Narvik',         source: 'Fremover' },
    { city: 'Romerike',       source: 'Romerikes Blad' },
    { city: 'Bærum',          source: 'Budstikka' },
    { city: 'Lofoten',        source: 'Lofotposten' },
    { city: 'Haugesund',      source: 'Haugesunds Avis' },
    { city: 'Gudbrandsdalen', source: 'Gudbrandsdølen Dagningen' },
    { city: 'Halden',         source: 'Halden Arbeiderblad' },
    { city: 'Namsos',         source: 'Namdalsavisa' },
    { city: 'Vesterålen',     source: 'Bladet Vesterålen' },
    { city: 'Drammen',        source: 'Drammens Tidende' },
    { city: 'Mo i Rana',      source: 'Rana Blad' },
    { city: 'Hamar',          source: 'Hamar Arbeiderblad' },
    { city: 'Elverum',        source: 'Østlendingen' },
    { city: 'Kongsvinger',    source: 'Glåmdalen' },
    { city: 'Steinkjer',      source: 'Steinkjer-Avisa' },
  ];

  function drawTreemap(data, containerId, H, colorFn, clickFn) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';

    if (!data.length) {
      container.style.height = '60px';
      container.innerHTML = '<p style="text-align:center;padding:1rem 2rem;color:#9ca3af;font-size:.85rem">Ingen data funnet.</p>';
      return;
    }

    const W = container.clientWidth || 900;
    container.style.height = H + 'px';

    const root = d3.hierarchy({ children: data })
      .sum(d => d.count)
      .sort((a, b) => b.value - a.value);

    d3.treemap().size([W, H]).padding(3).round(true)(root);

    const svg = d3.create('svg').attr('width', W).attr('height', H);

    const node = svg.selectAll('g')
      .data(root.leaves())
      .join('g')
      .attr('transform', d => `translate(${d.x0},${d.y0})`)
      .style('cursor', 'pointer')
      .on('click', (event, d) => { clickFn(d.data); tooltip.style.opacity = 0; })
      .on('mousemove', (event, d) => {
        tooltip.textContent = `${d.data.text}  ·  ${d.data.count.toLocaleString('nb-NO')} artikler`;
        tooltip.style.opacity = 1;
        tooltip.style.left = (event.clientX + 12) + 'px';
        tooltip.style.top  = (event.clientY - 28) + 'px';
      })
      .on('mouseleave', () => { tooltip.style.opacity = 0; });

    node.append('rect')
      .attr('width',  d => d.x1 - d.x0)
      .attr('height', d => d.y1 - d.y0)
      .attr('rx', 4)
      .attr('fill',         d => colorFn(d.data).fill)
      .attr('stroke',       d => colorFn(d.data).stroke)
      .attr('stroke-width', 1.5);

    node.append('text')
      .attr('x', d => (d.x1 - d.x0) / 2)
      .attr('y', d => (d.y1 - d.y0) / 2)
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'middle')
      .attr('fill', d => colorFn(d.data).text)
      .style('pointer-events', 'none')
      .style('user-select', 'none')
      .each(function(d) {
        const w = d.x1 - d.x0, h = d.y1 - d.y0;
        if (w < 24 || h < 14) return;
        const fs = Math.min(13, Math.max(9, Math.sqrt(w * h) * 0.11));
        const maxChars = Math.floor(w / (fs * 0.6));
        const lbl = d.data.text.length <= maxChars ? d.data.text : d.data.text.slice(0, maxChars - 1) + '…';
        d3.select(this).style('font-size', `${fs}px`).style('font-weight', '600').text(lbl);
      });

    container.appendChild(svg.node());
  }

  async function loadEntities() {
    const params = new URLSearchParams({ limit: 36, source: activeSource });
    if (activeLabel) params.set('label', activeLabel);
    const data = await fetch(`/api/entities?${params}`).then(r => r.json());
    drawTreemap(data, 'bubble-chart', 280, d => col(d.label), d => {
      searchEl.value = d.text; currentPage = 1; loadArticles();
    });
  }

  async function loadTopicsChart() {
    const data = await fetch('/api/topics').then(r => r.json());
    const items = data.map(({ topic, count }) => ({ text: TOPIC_LABELS[topic] || topic, key: topic, count }));
    drawTreemap(items, 'topics-chart', 220,
      d => {
        const c = TOPIC_COLORS[d.key] || SOURCE_COLOR;
        return d.key === activeTopic ? { fill: c.stroke, stroke: c.stroke, text: '#fff' } : c;
      },
      d => {
        activeTopic = activeTopic === d.key ? '' : d.key;
        currentPage = 1; loadArticles(); loadTopicsChart();
      }
    );
  }

  async function loadSourcesChart() {
    const data = await fetch('/api/sources').then(r => r.json());
    const items = data.slice(0, 15).map(({ source, count }) => ({ text: source, count }));
    drawTreemap(items, 'sources-chart', 240,
      d => d.text === activeSource ? SOURCE_ACTIVE : SOURCE_COLOR,
      d => {
        activeSource = activeSource === d.text ? '' : d.text;
        currentPage = 1; loadArticles(); loadSourcesChart();
      }
    );
  }

  async function loadPlacesChart() {
    const data = await fetch('/api/sources').then(r => r.json());
    const counts = Object.fromEntries(data.map(({ source, count }) => [source, count]));
    const items = PLACES
      .map(({ city, source }) => ({ text: city, source, count: counts[source] || 0 }))
      .filter(d => d.count > 0)
      .sort((a, b) => b.count - a.count);
    drawTreemap(items, 'places-chart', 240,
      d => d.source === activeSource ? PLACE_ACTIVE : PLACE_COLOR,
      d => {
        activeSource = activeSource === d.source ? '' : d.source;
        currentPage = 1; loadArticles(); loadPlacesChart();
      }
    );
  }

  let _coverageLoading = false;

  async function loadCoverageChart() {
    if (_coverageLoading) return;
    _coverageLoading = true;
    const container = document.getElementById('coverage-chart');
    if (!container.hasChildNodes())
      container.innerHTML = '<p style="color:var(--muted);font-size:.8rem;padding:.5rem">Laster dekningsdata…</p>';

    let data;
    try { data = await fetch('/api/coverage?days=14').then(r => r.json()); }
    finally { _coverageLoading = false; }
    if (!data) return;
    const { dates, series } = data;
    if (!series.length) { container.innerHTML = '<p style="color:var(--muted);font-size:.8rem;padding:.5rem">Ingen data.</p>'; return; }

    // Color scale: 0=very light gray, 1-4=light green, 5-14=medium green, 15+=dark green
    function cellColor(n) {
      if (n === 0)  return '#f1f5f9';
      if (n < 5)   return '#bbf7d0';
      if (n < 15)  return '#4ade80';
      return '#16a34a';
    }
    function textColor(n) { return n >= 15 ? '#fff' : n === 0 ? '#94a3b8' : '#166534'; }

    // Day labels: "lø 10", "sø 11", "ma 12", etc.
    const DAY_NO = ['sø','ma','ti','on','to','fr','lø'];
    function dayLabel(iso) {
      const d = new Date(iso + 'T12:00:00');
      return DAY_NO[d.getDay()] + ' ' + d.getDate();
    }

    const table = document.createElement('table');
    table.className = 'coverage-table';

    // Header row
    const thead = table.createTHead();
    const hrow = thead.insertRow();
    const th0 = document.createElement('th');
    th0.textContent = 'Kilde';
    hrow.appendChild(th0);
    dates.forEach(d => {
      const th = document.createElement('th');
      th.textContent = dayLabel(d);
      hrow.appendChild(th);
    });

    // Body: one row per source, sorted by total desc
    const tbody = table.createTBody();
    series.forEach(({ source, daily }) => {
      const recentZero = daily.slice(-3).some(n => n === 0);
      const row = tbody.insertRow();
      const label = row.insertCell();
      label.className = 'src-label';
      label.textContent = source;
      if (recentZero) label.style.color = '#dc2626';
      label.title = 'Klikk for å filtrere';
      label.addEventListener('click', () => {
        activeSource = activeSource === source ? '' : source;
        currentPage = 1; loadArticles(); loadCoverageChart();
      });
      if (source === activeSource) label.style.fontWeight = '700';

      daily.forEach(n => {
        const cell = row.insertCell();
        const div = document.createElement('div');
        div.className = 'cov-cell';
        div.style.background = cellColor(n);
        div.style.color = textColor(n);
        div.textContent = n > 0 ? n : '';
        cell.appendChild(div);
      });
    });

    container.innerHTML = '';
    container.appendChild(table);

    const total = series.length;
    const silent = series.filter(s => s.daily.slice(-1)[0] === 0).length;
    const note = document.createElement('p');
    note.style.cssText = 'font-size:.72rem;color:var(--muted);margin-top:.5rem';
    note.textContent = `${total} kilder · ${total - silent} aktive i dag · ${silent} stille`;
    container.appendChild(note);
  }

  // Redraw active chart on resize
  let resizeTimer;
  new ResizeObserver(() => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const active = document.querySelector('.main-tab.open');
      if (!active) return;
      const p = active.dataset.panel;
      if (p === 'trends') loadEntities();
      else if (p === 'topics') loadTopicsChart();
      else if (p === 'sources') loadSourcesChart();
      else if (p === 'places') loadPlacesChart();
      // coverage is an HTML table — no pixel redraw needed on resize
    }, 150);
  }).observe(document.querySelector('.entities-inner'));

  // ── main tabs ─────────────────────────────────────────────────────────────

  document.getElementById('main-tabs').addEventListener('click', e => {
    const tab = e.target.closest('.main-tab');
    if (!tab) return;
    const panelId = 'panel-' + tab.dataset.panel;
    if (document.getElementById(panelId).classList.contains('open')) return;
    document.querySelectorAll('.main-panel').forEach(p => p.classList.remove('open'));
    document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('open'));
    document.getElementById(panelId).classList.add('open');
    tab.classList.add('open');
    if (tab.dataset.panel === 'trends') loadEntities();
    else if (tab.dataset.panel === 'topics') loadTopicsChart();
    else if (tab.dataset.panel === 'sources') loadSourcesChart();
    else if (tab.dataset.panel === 'places') loadPlacesChart();
    else if (tab.dataset.panel === 'coverage') loadCoverageChart();
  });

  // ── label filter buttons ──────────────────────────────────────────────────

  document.getElementById('label-filters').addEventListener('click', e => {
    const btn = e.target.closest('.label-btn');
    if (!btn) return;
    document.querySelectorAll('.label-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeLabel = btn.dataset.label;
    loadEntities();
  });

  // ── sentiment timeline ───────────────────────────────────────────────────

  async function loadSentimentChart() {
    const params = new URLSearchParams({
      source: activeSource,
      topic:  activeTopic,
      q:      searchEl.value.trim(),
      date_from: dateFromEl.value,
      date_to:   dateToEl.value,
    });
    const data = await fetch(`/api/sentiment-timeline?${params}`).then(r => r.json());
    drawSentimentChart(data);
  }

  function drawSentimentChart(data) {
    const container = document.getElementById('sentiment-chart');
    container.innerHTML = '';
    if (!data.length) return;

    const m = { top: 6, right: 8, bottom: 22, left: 28 };
    const W = container.clientWidth || 400;
    const H = 90;
    const w = W - m.left - m.right;
    const h = H - m.top  - m.bottom;

    const COLORS = { positive: '#4ade80', neutral: '#d1d5db', negative: '#f87171' };
    const keys   = ['positive', 'neutral', 'negative'];

    const stacked = d3.stack().keys(keys)(data);
    const maxVal  = d3.max(stacked[stacked.length - 1], d => d[1]) || 1;

    const x = d3.scaleBand()
      .domain(data.map(d => d.date))
      .range([0, w]).padding(0.12);

    const y = d3.scaleLinear().domain([0, maxVal]).range([h, 0]).nice();

    const svg = d3.create('svg').attr('width', W).attr('height', H);
    const g   = svg.append('g').attr('transform', `translate(${m.left},${m.top})`);

    // Grid lines
    g.append('g')
      .call(d3.axisLeft(y).ticks(3).tickSize(-w).tickFormat(''))
      .call(a => a.select('.domain').remove())
      .call(a => a.selectAll('line').attr('stroke', '#f0f0f0'));

    // Stacked bars
    g.selectAll('g.layer')
      .data(stacked)
      .join('g')
        .attr('fill', d => COLORS[d.key])
        .selectAll('rect')
        .data(d => d)
        .join('rect')
          .attr('x',      d => x(d.data.date))
          .attr('y',      d => y(d[1]))
          .attr('height', d => Math.max(0, y(d[0]) - y(d[1])))
          .attr('width',  x.bandwidth())
          .on('mousemove', (event, d) => {
            const total = d.data.positive + d.data.neutral + d.data.negative;
            tooltip.innerHTML =
              `<b>${d.data.date}</b>  ${total} art.<br>` +
              `▲ ${d.data.positive} pos · ${d.data.neutral} nøy · ${d.data.negative} neg`;
            tooltip.style.opacity = 1;
            tooltip.style.left = (event.clientX + 12) + 'px';
            tooltip.style.top  = (event.clientY - 36) + 'px';
          })
          .on('mouseleave', () => { tooltip.style.opacity = 0; });

    // X-axis dates
    const step = Math.ceil(data.length / 7);
    g.append('g')
      .attr('transform', `translate(0,${h})`)
      .call(
        d3.axisBottom(x)
          .tickValues(data.filter((_, i) => i % step === 0).map(d => d.date))
          .tickFormat(d => new Date(d).toLocaleDateString('nb-NO', { day: 'numeric', month: 'short' }))
          .tickSize(0)
      )
      .call(a => a.select('.domain').remove())
      .selectAll('text')
        .attr('dy', '1em')
        .style('font-size', '10px')
        .style('fill', '#737373');

    // Y-axis
    g.append('g')
      .call(d3.axisLeft(y).ticks(3))
      .call(a => a.select('.domain').remove())
      .call(a => a.selectAll('line').remove())
      .selectAll('text')
        .style('font-size', '10px')
        .style('fill', '#737373');

    container.appendChild(svg.node());
  }

  // ── share of voice (entity timeline) ─────────────────────────────────────

  const LINE_COLORS = ['#e63946','#457b9d','#2a9d8f','#e9c46a','#f4a261','#6d6875','#264653','#b5838d'];

  async function loadEntityTimeline() {
    const params = new URLSearchParams({ source: activeSource, topic: activeTopic });
    const data = await fetch(`/api/entity-timeline?${params}`).then(r => r.json());
    drawEntityTimeline(data);
  }

  function drawEntityTimeline(data) {
    const container = document.getElementById('sov-chart');
    container.innerHTML = '';
    if (!data.dates || !data.dates.length || !data.series || !data.series.length) {
      container.innerHTML = '<p style="color:#9ca3af;font-size:.75rem;padding:.4rem 0">Ingen data</p>';
      return;
    }

    const legendW = 118;
    const m = { top: 6, right: 6, bottom: 22, left: 28 };
    const W = container.clientWidth || 600;
    const H = 90;
    const w = W - m.left - m.right - legendW;
    const h = H - m.top - m.bottom;

    const x = d3.scalePoint().domain(data.dates).range([0, w]).padding(0.15);
    const maxVal = d3.max(data.series.flatMap(s => s.values)) || 1;
    const y = d3.scaleLinear().domain([0, maxVal]).range([h, 0]).nice();

    const line = d3.line()
      .x((v, i) => x(data.dates[i]))
      .y(v => y(v))
      .curve(d3.curveMonotoneX);

    const svg = d3.create('svg').attr('width', W).attr('height', H);
    const g   = svg.append('g').attr('transform', `translate(${m.left},${m.top})`);

    g.append('g')
      .call(d3.axisLeft(y).ticks(3).tickSize(-w).tickFormat(''))
      .call(a => a.select('.domain').remove())
      .call(a => a.selectAll('line').attr('stroke', '#f0f0f0'));

    data.series.forEach((s, i) => {
      const color = LINE_COLORS[i % LINE_COLORS.length];
      g.append('path').datum(s.values)
        .attr('fill', 'none').attr('stroke', color).attr('stroke-width', 2).attr('d', line);
      g.selectAll(null).data(s.values).join('circle')
        .attr('cx', (v, j) => x(data.dates[j])).attr('cy', v => y(v))
        .attr('r', 3).attr('fill', color)
        .on('mousemove', (event, v) => {
          const j = s.values.indexOf(v);
          tooltip.textContent = `${s.entity}  ·  ${data.dates[j]}  ·  ${v} art.`;
          tooltip.style.opacity = 1;
          tooltip.style.left = (event.clientX + 12) + 'px';
          tooltip.style.top  = (event.clientY - 28) + 'px';
        })
        .on('mouseleave', () => { tooltip.style.opacity = 0; });
    });

    const step = Math.max(1, Math.ceil(data.dates.length / 6));
    g.append('g').attr('transform', `translate(0,${h})`)
      .call(d3.axisBottom(x)
        .tickValues(data.dates.filter((_, i) => i % step === 0))
        .tickFormat(d => new Date(d + 'T12:00').toLocaleDateString('nb-NO', { day: 'numeric', month: 'short' }))
        .tickSize(0))
      .call(a => a.select('.domain').remove())
      .selectAll('text').attr('dy', '1em').style('font-size', '10px').style('fill', '#737373');

    g.append('g').call(d3.axisLeft(y).ticks(3))
      .call(a => a.select('.domain').remove())
      .call(a => a.selectAll('line').remove())
      .selectAll('text').style('font-size', '10px').style('fill', '#737373');

    const legend = svg.append('g').attr('transform', `translate(${m.left + w + 10},${m.top})`);
    data.series.forEach((s, i) => {
      const color = LINE_COLORS[i % LINE_COLORS.length];
      const row = legend.append('g').attr('transform', `translate(0,${i * 14})`);
      row.append('line').attr('x1', 0).attr('x2', 12).attr('y1', 5).attr('y2', 5)
        .attr('stroke', color).attr('stroke-width', 2);
      row.append('circle').attr('cx', 6).attr('cy', 5).attr('r', 2.5).attr('fill', color);
      const lbl = s.entity.length > 15 ? s.entity.slice(0, 14) + '…' : s.entity;
      row.append('text').attr('x', 16).attr('y', 9).text(lbl)
        .style('font-size', '9.5px').style('fill', '#374151');
    });

    container.appendChild(svg.node());
  }

  // ── articles ──────────────────────────────────────────────────────────────

  async function loadArticles() {
    renderSkeletons();

    const params = new URLSearchParams({
      page: currentPage,
      limit: 20,
      source: activeSource,
      topic: activeTopic,
      q: searchEl.value.trim(),
      date_from: dateFromEl.value,
      date_to: dateToEl.value,
    });

    const data = await fetch(`/api/articles?${params}`).then(r => r.json());

    statsEl.textContent = `${data.total.toLocaleString('nb-NO')} artikler`;
    updatedEl.textContent = `Side ${data.page} av ${data.pages}`;

    if (data.articles.length === 0) {
      grid.innerHTML = '<p class="empty">Ingen artikler funnet.</p>';
      pagination.innerHTML = '';
      loadSentimentChart(); loadEntityTimeline();
      return;
    }

    const sentimentLabel = { positive: 'Positiv', negative: 'Negativ', neutral: 'Nøytral' };

    grid.innerHTML = data.articles.map(a => `
      <a class="card" href="${a.url}" target="_blank" rel="noopener">
        <div class="card-source">
          ${a.source || 'Ukjent kilde'}
          ${a.sentiment ? `<span class="badge sentiment-${a.sentiment}">${sentimentLabel[a.sentiment] || a.sentiment}</span>` : ''}
        </div>
        <div class="card-title">${a.title || 'Uten tittel'}</div>
        ${a.snippet ? `<div class="card-snippet">${a.snippet}…</div>` : ''}
        ${tagHtml(a.entities) ? `<div class="tags">${tagHtml(a.entities)}</div>` : ''}
        <div class="card-meta">
          <span>${a.author || ''}</span>
          <span>${fmt(a.published_at)}</span>
        </div>
      </a>`).join('');

    renderPagination(data.page, data.pages);
    loadSentimentChart();
    loadEntityTimeline();
  }

  function renderPagination(page, pages) {
    if (pages <= 1) { pagination.innerHTML = ''; return; }

    const range = [];
    for (let i = Math.max(1, page - 2); i <= Math.min(pages, page + 2); i++) range.push(i);

    pagination.innerHTML = `
      <button class="page-btn" ${page === 1 ? 'disabled' : ''} onclick="go(${page - 1})">←</button>
      ${range[0] > 1 ? `<button class="page-btn" onclick="go(1)">1</button>${range[0] > 2 ? '<span>…</span>' : ''}` : ''}
      ${range.map(p => `<button class="page-btn ${p === page ? 'active' : ''}" onclick="go(${p})">${p}</button>`).join('')}
      ${range.at(-1) < pages ? `${range.at(-1) < pages - 1 ? '<span>…</span>' : ''}<button class="page-btn" onclick="go(${pages})">${pages}</button>` : ''}
      <button class="page-btn" ${page === pages ? 'disabled' : ''} onclick="go(${page + 1})">→</button>`;
  }

  // ── events ────────────────────────────────────────────────────────────────

  window.go = function(p) { currentPage = p; loadArticles(); window.scrollTo(0, 0); };

  searchEl.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 1; loadArticles(); }, 400);
  });

  dateFromEl.addEventListener('change', () => { currentPage = 1; loadArticles(); });
  dateToEl.addEventListener('change',   () => { currentPage = 1; loadArticles(); });

  // Redraw analytics charts on resize
  let sentResizeTimer;
  new ResizeObserver(() => {
    clearTimeout(sentResizeTimer);
    sentResizeTimer = setTimeout(() => { loadSentimentChart(); loadEntityTimeline(); }, 150);
  }).observe(document.querySelector('.analytics-inner'));

  // ── init ──────────────────────────────────────────────────────────────────
  loadArticles();   // also triggers loadSentimentChart at end
  loadEntities();
</script>
</body>
</html>
